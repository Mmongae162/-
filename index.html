<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 음성 판별 퀴즈</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    
    <!-- 첫 화면 -->
    <section id="screen-intro" class="screen active">
      <div class="card">
        <div class="corner-info">
          과학동아리 이름<br />
          조원: 홍길동, 김철수, 이영희
        </div>

        <h1>AI 음성 판별 퀴즈</h1>
        <p class="description">
          TTS 기술을 이용하여 AI와 사람의 목소리를 판별하는 퀴즈를 하려고 합니다.
        </p>

        <button id="to-start-screen" class="main-button">다음</button>
      </div>
    </section>

    <!-- 두 번째 화면 -->
    <section id="screen-start" class="screen">
      <div class="card">
        <h2>AI 판별 퀴즈를 시작하시겠습니까?</h2>
        <p class="description">
          준비가 되었다면 시작하기 버튼을 눌러 주세요.
        </p>

        <div class="button-group">
          <button id="start-quiz-button" class="main-button">시작하기</button>
          <button id="back-to-intro" class="sub-button">돌아가기</button>
        </div>
      </div>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
