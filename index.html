<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 음성 판별 퀴즈</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      text-align: center;
      background: #1f2937;
      padding: 30px;
      border-radius: 20px;
      max-width: 700px;
      width: 90%;
    }

    h1 {
      margin-bottom: 20px;
    }

    p {
      line-height: 1.6;
      color: #d1d5db;
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>AI 음성 판별 퀴즈</h1>
    <p>
      TTS 기술을 이용하여 AI와 사람의 목소리를 판별하는 퀴즈입니다.
      아래 버튼을 눌러 시작해보세요.
    </p>
    <button>다음</button>
  </div>
</body>
</html>
